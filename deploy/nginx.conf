server {
    listen 80;
    server_name cjhirashi.com www.cjhirashi.com;

    location /static/ {
        alias /home/REEMPLAZA_USUARIO/portafolio-cjhirashi/staticfiles/;
    }

    location /media/ {
        alias /home/REEMPLAZA_USUARIO/portafolio-cjhirashi/media/;
    }

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:8000;
    }
}
